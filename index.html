<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venta de Motos - VIBRAS POSITIVAS HM</title>
    <style>
        :root {
            --primary: #d4af37; /* Dorado elegante */
            --dark: #1a1a1a;
            --light: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e5e5e5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            width: 95%;
            max-width: 450px;
            border: 8px solid var(--primary);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            overflow: hidden;
            padding-bottom: 20px;
        }

        .header {
            text-align: center;
            padding: 15px;
            background: var(--dark);
            color: var(--primary);
        }

        .header h1 { margin: 0; font-size: 22px; text-transform: uppercase; }

        .gallery {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            padding: 10px;
        }

        .moto-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .moto-card img {
            width: 100%;
            height: auto;
            display: block;
        }

        .price-tag {
            background: rgba(0,0,0,0.7);
            color: var(--primary);
            padding: 5px 10px;
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-weight: bold;
            border-radius: 5px;
        }

        .form-section {
            padding: 15px;
            background: #fff;
        }

        .input-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .gps-btn {
            background: #f0f0f0;
            border: 1px dashed var(--primary);
            padding: 10px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 13px;
        }

        .submit-btn {
            background: var(--primary);
            color: var(--dark);
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .footer-credits {
            text-align: center;
            font-size: 12px;
            color: #777;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>MOTOS DISPONIBLES</h1>
        <small>Fotos Reales - Entrega Inmediata</small>
    </div>

    <div class="gallery">
        <div class="moto-card">
            <img src="https://images2.imgbox.com/f0/69/MndlGvVf_o.jpg" alt="Yamaha NMAX">
            <div class="price-tag">NMAX: $24.400.000</div>
        </div>
        <div class="moto-card">
            <img src="https://images2.imgbox.com/39/33/M5nQ1uT8_o.jpg" alt="Honda XR 190L">
            <div class="price-tag">XR 190L: $18.800.000</div>
        </div>
    </div>

    <div class="form-section">
        <div class="input-group">
            <label>Nombre Completo:</label>
            <input type="text" id="nombre" placeholder="Escriba su nombre">
        </div>
        
        <div class="input-group">
            <label>Celular:</label>
            <input type="tel" id="celular" placeholder="Número de contacto">
        </div>

        <div class="input-group">
            <label>Observaciones (¿Por cuál pregunta?):</label>
            <textarea id="obs" rows="2" placeholder="Ej: Me interesa la NMAX..."></textarea>
        </div>

        <div class="gps-btn" onclick="obtenerUbicacion()">
            📍 <span id="gps-status">Tocar para enviar mi ubicación (GPS)</span>
        </div>

        <input type="hidden" id="coordenadas">

        <button class="submit-btn" onclick="enviarDatos()">Enviar Solicitud</button>
        
        <div class="footer-credits">
            &copy; 2026 VIBRAS POSITIVAS HM
        </div>
    </div>
</div>

<script>
    function obtenerUbicacion() {
        const status = document.getElementById('gps-status');
        if (navigator.geolocation) {
            status.innerText = "Localizando...";
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    document.getElementById('coordenadas').value = `Lat: ${lat}, Lon: ${lon}`;
                    status.innerText = "📍 Ubicación capturada con éxito";
                    status.style.color = "green";
                },
                () => {
                    status.innerText = "❌ Error al capturar GPS";
                }
            );
        } else {
            status.innerText = "GPS no soportado en este navegador";
        }
    }

    function enviarDatos() {
        const nombre = document.getElementById('nombre').value;
        const celular = document.getElementById('celular').value;
        const obs = document.getElementById('obs').value;
        const gps = document.getElementById('coordenadas').value;

        if(!nombre || !celular) {
            alert("Por favor completa nombre y celular.");
            return;
        }

        // Aquí puedes integrar con un servicio de email o base de datos.
        // Por ahora simularemos el envío:
        alert(`¡Gracias ${nombre}! Hemos recibido tu interés por: ${obs}. Nos comunicaremos al ${celular}. Ubicación: ${gps}`);
        
        // Limpiar campos
        document.getElementById('nombre').value = "";
        document.getElementById('celular').value = "";
        document.getElementById('obs').value = "";
    }
</script>

</body>
</html>
