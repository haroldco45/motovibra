<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venta de Motos - VIBRAS POSITIVAS HM</title>
    <style>
        :root {
            --primary: #d4af37;
            --dark: #1a1a1a;
            --gold-gradient: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px 0;
        }

        .container {
            background: #fff;
            width: 90%;
            max-width: 400px;
            border: 5px solid;
            border-image: var(--gold-gradient) 1;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border-radius: 4px;
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 20px;
            background: var(--dark);
            color: #fff;
        }

        .header h1 { 
            margin: 0; 
            font-size: 20px; 
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .moto-box {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .moto-box img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }

        .info-tag {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            padding: 5px;
        }

        .price {
            font-size: 1.1rem;
            font-weight: bold;
            color: #27ae60;
        }

        .model-name {
            font-weight: bold;
            color: var(--dark);
        }

        .form-section {
            padding: 20px;
            background: #f9f9f9;
        }

        .input-group { margin-bottom: 15px; }

        label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
            text-transform: uppercase;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .gps-area {
            background: #fff;
            border: 1px dashed var(--primary);
            padding: 12px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: bold;
        }

        .submit-btn {
            background: var(--dark);
            color: var(--primary);
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .footer {
            text-align: center;
            padding: 15px;
            font-size: 10px;
            color: #888;
            background: #eee;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>VIBRAS POSITIVAS HM</h1>
        <div style="font-size: 11px; color: #aaa; letter-spacing: 1px;">MOTOS EN VENTA - FOTOS REALES</div>
    </div>

    <div class="moto-box">
        <img src="nmax.jpg" alt="Yamaha NMAX">
        <div class="info-tag">
            <span class="model-name">YAMAHA NMAX</span>
            <span class="price">$24.400.000</span>
        </div>
    </div>

    <div class="moto-box">
        <img src="xr.jpg" alt="Honda XR 190L">
        <div class="info-tag">
            <span class="model-name">HONDA XR 190L</span>
            <span class="price">$18.800.000</span>
        </div>
    </div>

    <div class="form-section">
        <div class="input-group">
            <label>Nombre Completo</label>
            <input type="text" id="nombre" placeholder="Tu nombre">
        </div>

        <div class="input-group">
            <label>Celular</label>
            <input type="tel" id="celular" placeholder="300 000 0000">
        </div>

        <div class="input-group">
            <label>¿Por cuál preguntas? (Observaciones)</label>
            <textarea id="obs" rows="2" placeholder="Escribe aquí tu duda..."></textarea>
        </div>
