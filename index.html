<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venta de Motos - VIBRAS POSITIVAS HM</title>
    <style>
        :root {
            --primary: #d4af37;
            --dark: #1a1a1a;
            --gold-gradient: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px 0;
        }

        .container {
            background: #fff;
            width: 90%;
            max-width: 400px;
            border: 5px solid;
            border-image: var(--gold-gradient) 1;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border-radius: 2px;
        }

        .header {
            text-align: center;
            padding: 20px;
            background: var(--dark);
            color: #fff;
        }

        .header h1 { 
            margin: 0; 
            font-size: 20px; 
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .moto-box {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .moto-box img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .info-tag {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            padding: 0 5px;
        }

        .price {
            font-size: 1.2rem;
            font-weight: bold;
            color: #27ae60;
        }

        .model-name {
            font-weight: bold;
            color: var(--dark);
        }

        .form-section {
            padding: 20px;
            background: #f9f9f9;
        }

        .input-group { margin-bottom: 15px; }

        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .gps-area {
            background: #fff;
            border: 1px dashed var(--primary);
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .submit-btn {
            background: var(--dark);
            color: var(--primary);
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .footer {
            text-align: center;
            padding: 15px;
            font-size: 11px;
            color: #888;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>VIBRAS POSITIVAS HM</h1>
        <div style="font-size: 12px; color: #aaa;">CATÁLOGO DE MOTOS DISPONIBLES</div>
    </div>

    <div class="moto-box">
        <img src="https://i.ibb.co/C3N8wYwY/nmax-real.jpg" alt="Yamaha NMAX">
        <div class="info-tag">
            <span class="model-name">YAMAHA NMAX</span>
            <span class="price">$24.400.000</span>
        </div>
    </div>

    <div class="moto-box">
        <img src="https://i.ibb.co/hR4f7RML/xr190-real.jpg" alt="Honda XR 190L">
        <div class="info-tag">
            <span class="model-name">HONDA XR 190L</span>
            <span class="price">$18.800.000</span>
        </div>
    </div>

    <div class="form-section">
        <div class="input-group">
            <label>NOMBRE COMPLETO</label>
            <input type="text" id="nombre" placeholder="Tu nombre">
        </div>

        <div class="input-group">
            <label>CELULAR</label>
            <input type="tel" id="celular" placeholder="300 000 0000">
        </div>

        <div class="input-group">
            <label>¿POR CUÁL PREGUNTAS? (OBSERVACIONES)</label>
            <textarea id="obs" rows="2" placeholder="Ej: Me interesa la XR para entrega inmediata"></textarea>
        </div>

        <div class="gps-area" onclick="geoLocalizar()">
            <span id="txt-gps">📍 TOCAR PARA VALIDAR UBICACIÓN (GPS)</span>
        </div>

        <input type="hidden" id="geo-data">

        <button class="submit-btn" onclick="enviar()">ENVIAR SOLICITUD</button>
    </div>

    <div class="footer">
        DESARROLLADO POR VIBRAS POSITIVAS HM &copy; 2026
    </div>
</div>

<script>
    function geoLocalizar() {
        const txt = document.getElementById('txt-gps');
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((p) => {
                document.getElementById('geo-data').value = `Lat: ${p.coords.latitude}, Lon: ${p.coords.longitude}`;
                txt.innerText = "✅ UBICACIÓN REGISTRADA";
                txt.style.color = "green";
            });
        }
    }

    function enviar() {
        const n = document.getElementById('nombre').value;
        const c = document.getElementById('celular').value;
        const g = document.getElementById('geo-data').value;
        
        if(!n || !c) return alert("Completa tus datos");
        
        alert(`Solicitud enviada con éxito.\nNombre: ${n}\nUbicación: ${g || 'No enviada'}`);
    }
</script>

</body>
</html>
